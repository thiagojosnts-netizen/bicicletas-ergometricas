<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    body { margin:0; padding:40px; background:#f8fafc; font-family:sans-serif; }
    .label { font-size:13px; color:#64748b; margin-bottom:8px; font-weight:600; }
    .box { background:white; border-radius:16px; padding:32px; border:1px solid #e2e8f0; display:inline-block; margin-bottom:40px; }
    .hero-mock { display:flex; align-items:stretch; max-width:900px; background:linear-gradient(135deg,#1a3d2e 0%,#2D6A4F 100%); border-radius:16px; overflow:hidden; margin-bottom:40px; }
    .hero-text { padding:48px 40px; flex:1; }
    .h1 { font-size:40px; font-weight:800; line-height:1.1; color:#fff; margin-bottom:16px; font-family:Georgia,serif; }
    .sub { font-size:16px; color:rgba(255,255,255,.85); line-height:1.65; margin-bottom:28px; }
    .btn { display:inline-block; background:#F4721B; color:white; padding:13px 26px; border-radius:8px; font-size:15px; font-weight:700; text-decoration:none; }
    .hero-visual { width:400px; flex-shrink:0; display:flex; align-items:center; justify-content:center; padding:24px; }
  </style>
</head>
<body>

<div class="label">1 — Bicicleta ergométrica SVG (isolada, fundo branco):</div>
<div class="box">
  <svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Blob decorativo -->
    <circle cx="290" cy="210" r="178" fill="#ecfdf5"/>
    <!-- Pontos decorativos -->
    <circle cx="62" cy="72" r="7" fill="#a7f3d0"/>
    <circle cx="82" cy="55" r="4.5" fill="#6ee7b7"/>
    <circle cx="48" cy="55" r="4.5" fill="#6ee7b7"/>
    <circle cx="460" cy="110" r="9" fill="#bbf7d0"/>
    <circle cx="482" cy="130" r="5.5" fill="#a7f3d0"/>
    <circle cx="78" cy="355" r="7" fill="#a7f3d0"/>
    <circle cx="470" cy="360" r="5.5" fill="#bbf7d0"/>
    <!-- Estabilizadores base (sem rodas) -->
    <line x1="92" y1="358" x2="210" y2="358" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <line x1="318" y1="358" x2="435" y2="358" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <line x1="158" y1="358" x2="158" y2="338" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <line x1="378" y1="358" x2="378" y2="312" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <!-- Volante (flywheel) — menor que roda de bicicleta de rua -->
    <circle cx="368" cy="292" r="56" fill="none" stroke="#047857" stroke-width="11" stroke-linecap="round"/>
    <circle cx="368" cy="292" r="10" fill="#047857"/>
    <!-- Raios do volante (6 raios) -->
    <line x1="368" y1="292" x2="368" y2="236" stroke="#047857" stroke-width="3.5"/>
    <line x1="368" y1="292" x2="416" y2="264" stroke="#047857" stroke-width="3.5"/>
    <line x1="368" y1="292" x2="416" y2="320" stroke="#047857" stroke-width="3.5"/>
    <line x1="368" y1="292" x2="368" y2="348" stroke="#047857" stroke-width="3.5"/>
    <line x1="368" y1="292" x2="320" y2="320" stroke="#047857" stroke-width="3.5"/>
    <line x1="368" y1="292" x2="320" y2="264" stroke="#047857" stroke-width="3.5"/>
    <!-- Pedivelas -->
    <line x1="368" y1="292" x2="337" y2="248" stroke="#047857" stroke-width="8" stroke-linecap="round"/>
    <rect x="311" y="241" width="33" height="9" rx="3" fill="#047857"/>
    <line x1="368" y1="292" x2="399" y2="336" stroke="#047857" stroke-width="8" stroke-linecap="round"/>
    <rect x="397" y="334" width="33" height="9" rx="3" fill="#047857"/>
    <!-- Quadro principal (tubo diagonal) -->
    <line x1="160" y1="340" x2="316" y2="278" stroke="#047857" stroke-width="12" stroke-linecap="round"/>
    <!-- Tubo do selim (quase vertical) -->
    <line x1="160" y1="340" x2="152" y2="180" stroke="#047857" stroke-width="10" stroke-linecap="round"/>
    <!-- Selim (largo, levemente curvado — ergométrico) -->
    <line x1="120" y1="178" x2="196" y2="175" stroke="#047857" stroke-width="5" stroke-linecap="round"/>
    <path d="M114 169 Q152 159 200 169" fill="none" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <!-- Haste do guidão -->
    <line x1="300" y1="268" x2="283" y2="106" stroke="#047857" stroke-width="10" stroke-linecap="round"/>
    <!-- Guidão reto (NÃO drop bar — ergométrico/upright) -->
    <line x1="240" y1="106" x2="326" y2="106" stroke="#047857" stroke-width="10" stroke-linecap="round"/>
    <!-- Punhos levemente curvados para baixo (ergométrico) -->
    <path d="M240 106 Q232 111 229 125" fill="none" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <path d="M326 106 Q334 111 337 125" fill="none" stroke="#047857" stroke-width="9" stroke-linecap="round"/>
    <!-- Travessa do quadro (brace horizontal) -->
    <line x1="298" y1="265" x2="165" y2="260" stroke="#047857" stroke-width="8" stroke-linecap="round"/>
    <!-- Botão de resistência (elemento característico da ergométrica) -->
    <circle cx="294" cy="240" r="13" fill="none" stroke="#047857" stroke-width="5"/>
    <circle cx="294" cy="240" r="4.5" fill="#047857"/>
    <!-- Painel/console digital (retângulo acima do guidão) -->
    <rect x="257" y="121" width="50" height="28" rx="5" fill="none" stroke="#047857" stroke-width="5"/>
    <line x1="264" y1="130" x2="300" y2="130" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="264" y1="138" x2="293" y2="138" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</div>

<br/>

      <!-- Selim -->

      <!-- Guidão reto -->

      <rect x="257" y="121" width="50" height="28" rx="5" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="5"/>

    </svg>
  </div>
</div>

</body>
</html>
